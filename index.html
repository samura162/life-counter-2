<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini MTG EDH Counter</title>
    <link rel="icon" href="favicon.png" type="image/png"> <style>
    <style>
        html, body { 
            margin: 0; padding: 0; min-height: 100vh; width: 100vw; 
            background: #111; color: #fff; font-family: sans-serif; 
        }
        .app-header {
            height: 4vh; display: flex; justify-content: space-between; align-items: center; padding: 0 10px; background: #000;
        }
        .header-btns { display: flex; gap: 5px; }
        .reset-btn {
            background: #444; color: #fff; border: none; border-radius: 4px; padding: 2px 8px; font-size: 0.7rem; cursor: pointer;
        }
        .order-btn {
            background: #2e7d32; color: #fff; border: none; border-radius: 4px; padding: 2px 8px; font-size: 0.7rem; cursor: pointer;
        }
        .grid { 
            display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; 
            height: 96vh; width: 100vw; gap: 2px; box-sizing: border-box; 
        }
        
        /* メイングリッド（時計回り） */
        #slot-P1 { grid-area: 1 / 1 / 2 / 2; } /* 左上: 1 */
        #slot-P2 { grid-area: 1 / 2 / 2 / 3; } /* 右上: 2 */
        #slot-P3 { grid-area: 2 / 2 / 3 / 3; } /* 右下: 3 */
        #slot-P4 { grid-area: 2 / 1 / 3 / 2; } /* 左下: 4 */

        .player-box { 
            background: #222; display: flex; flex-direction: column; 
            justify-content: space-around; padding: 2px; border: 1px solid #333; overflow: hidden;
            transition: background 0.2s;
        }
        .player-box.shuffling { background: #444; }

        .header-area { 
            display: flex; align-items: center; height: 10%; padding: 0 2px; gap: 4px; width: 100%; box-sizing: border-box;
        }
        .order-num { font-size: 1rem; font-weight: bold; color: #666; flex-shrink: 0; }
        .partner-wrapper { display: flex; align-items: center; gap: 1px; font-size: 0.6rem; color: #888; white-space: nowrap; flex-shrink: 0; }
        .name-select { background: transparent; color: #ddd; border: none; font-size: 0.85rem; font-weight: bold; outline: none; flex-grow: 1; min-width: 0; }

        .main-display-wrapper { height: 45%; display: flex; align-items: center; justify-content: center; gap: 2px; width: 100%; }
        .life-center-unit { display: flex; flex-direction: column; align-items: center; width: 62%; height: 100%; justify-content: space-around; }
        .life-wrapper { width: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; height: 55%; }
        .life { 
            font-size: 10vh; font-weight: bold; border: none; background: transparent; 
            width: 100%; text-align: center; outline: none; padding: 0; transition: color 0.3s;
        }
        .life.small-font { font-size: 7vh; }
        .life-btn-group { display: flex; justify-content: center; gap: 10px; width: 100%; height: 28%; }
        .btn-life { flex: 1; max-width: 80px; height: 100%; font-size: 1.3rem; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; }
        .btn-minus { background: #d32f2f; color: #fff; }
        .btn-plus { background: #388e3c; color: #fff; }
        .num-select { background: #333; color: #fff; border: 1px solid #444; font-size: 0.7rem; width: 90%; border-radius: 4px; height: 15%; }
        
        .sidebar-counters { display: flex; flex-direction: column; gap: 2px; width: 36%; height: 100%; justify-content: center; }
        .side-item { background: #1a1a1a; border: 1px solid #333; border-radius: 4px; padding: 1px 2px; display: flex; align-items: center; justify-content: space-between; }
        .side-label { font-size: 0.4rem; white-space: nowrap; width: 22px; font-weight: bold; }
        .side-val { font-weight: bold; font-size: 0.8rem; min-width: 12px; text-align: center; transition: color 0.3s; }
        .btn-side { width: 16px; height: 16px; background: #333; border: none; color: #fff; border-radius: 2px; cursor: pointer; font-size: 0.6rem; }

        .side-dice-wrapper { background: #111; border: 1px solid #333; border-radius: 4px; padding: 2px; display: flex; flex-direction: column; gap: 2px; margin-top: 1px; }
        .side-dice-input-row { display: flex; gap: 1px; align-items: center; justify-content: space-between; }
        .dice-input { width: 55%; background: transparent; border: none; color: #aaa; font-size: 0.6rem; text-align: center; border-bottom: 1px solid #444; outline: none; }
        .dice-btn { background: #333; color: #fff; border: none; font-size: 0.5rem; padding: 2px 4px; border-radius: 2px; cursor: pointer; }
        .dice-res-row { display: flex; justify-content: space-around; align-items: center; height: 12px; }
        .dice-format { font-size: 0.35rem; color: #555; }
        .dice-result { color: #ffeb3b; font-weight: bold; font-size: 0.75rem; min-width: 15px; }

        /* 統率者ダメージエリア（時計回り） */
        .commander-area { height: 45%; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 2px; padding: 2px; }
        .cmd-P1 { grid-area: 1 / 1 / 2 / 2; } /* 左上 */
        .cmd-P2 { grid-area: 1 / 2 / 2 / 3; } /* 右上 */
        .cmd-P3 { grid-area: 2 / 2 / 3 / 3; } /* 右下 */
        .cmd-P4 { grid-area: 2 / 1 / 3 / 2; } /* 左下 */

        .cmd-box { background: #1a1a1a; padding: 2px; border-radius: 2px; font-size: 0.5rem; display: flex; flex-direction: column; overflow: hidden; border: 1px solid transparent; }
        .cmd-box.is-self { opacity: 0.4; border: 1px dashed #333; }
        .cmd-header { display: flex; align-items: center; gap: 2px; border-bottom: 1px solid #333; padding-bottom: 1px; margin-bottom: 1px; }
        .cmd-order { color: #555; font-weight: bold; }
        .cmd-name-label { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-grow: 1; color: #aaa; font-size: 0.4rem; }
        .cmd-body { display: flex; justify-content: space-around; flex-grow: 1; align-items: center; }
        .cmd-unit { display: flex; flex-direction: column; align-items: center; gap: 1px; width: 48%; }
        .cmd-side-label { color: #444; font-size: 0.4rem; line-height: 1; }
        .cmd-val-wrap { display: flex; align-items: center; gap: 1px; }
        .cmd-val { font-size: 0.8rem; font-weight: bold; min-width: 12px; text-align: center; transition: color 0.3s; }
        .btn-cmd { width: 14px; height: 14px; font-size: 0.6rem; background: #333; color: #fff; border: none; border-radius: 2px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="app-header">
        <span style="font-size:0.8rem; font-weight:bold; color:#777;">Gemini MTG EDH Counter</span>
        <div class="header-btns">
            <button class="order-btn" onclick="shuffleNames()">席順シャッフル</button>
            <button class="reset-btn" onclick="resetGame()">リセット</button>
        </div>
    </div>
    <div class="grid" id="main-grid"></div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDQl03fhI7AQH2Ip2dkPOlCBGOHfxKXtEE",
            authDomain: "test-63aa0.firebaseapp.com",
            databaseURL: "https://test-63aa0-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "test-63aa0",
            storageBucket: "test-63aa0.firebasestorage.app",
            messagingSenderId: "1065998979270",
            appId: "1:1065998979270:web:a5d3e96dbe9062a37ac7c7"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const rootRef = db.ref('mtg/edh-session-final-v20');
        const memberRef = db.ref('mtg/members');

        const playerSlots = ['P1', 'P2', 'P3', 'P4'];
        const grid = document.getElementById('main-grid');

        playerSlots.forEach((slot, index) => {
            let html = `
                <div class="player-box" id="slot-${slot}">
                    <div class="header-area">
                        <span class="order-num">${index + 1}</span>
                        <div class="partner-wrapper">
                            <input type="checkbox" id="check-${slot}" class="partner-check" onchange="directInput('${slot}/isPartner', this.checked)">
                            <label for="check-${slot}">共闘</label>
                        </div>
                        <select id="name-${slot}" class="name-select" onchange="if(this.value!=='') directInput('${slot}/name', this.value)">
                            <option value="">名前選択</option>
                        </select>
                    </div>

                    <div class="main-display-wrapper">
                        <div class="life-center-unit">
                            <div class="life-wrapper">
                                <input type="number" id="life-${slot}" class="life" value="40" onchange="directInput('${slot}/life', parseInt(this.value))">
                            </div>
                            <div class="life-btn-group">
                                <button class="btn-life btn-minus" onclick="changeValue('${slot}/life', -1)">-1</button>
                                <button class="btn-life btn-plus" onclick="changeValue('${slot}/life', 1)">+1</button>
                            </div>
                            <select class="num-select" onchange="if(this.value !== '') { directInput('${slot}/life', parseInt(this.value)); this.value = ''; }">
                                <option value="">リストから</option>
                                ${Array.from({length:150}, (_,i)=>`<option value="${i+1}">${i+1}</option>`).join('')}
                            </select>
                        </div>
                        <div class="sidebar-counters">
                            <div id="side-main-${slot}"></div>
                            <div class="side-dice-wrapper">
                                <div class="side-dice-input-row">
                                    <input type="text" id="dice-in-${slot}" class="dice-input" value="1d20" placeholder="1d20">
                                    <button class="dice-btn" onclick="triggerDice('${slot}')">振</button>
                                </div>
                                <div class="dice-res-row">
                                    <div id="dice-fmt-${slot}" class="dice-format"></div>
                                    <div id="dice-res-${slot}" class="dice-result">--</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="commander-area" id="cmd-area-${slot}"></div>
                </div>`;
            grid.insertAdjacentHTML('beforeend', html);
        });

        function getDynamicColor(val, type) {
            if (type === 'life') {
                if (val <= 0) return "#f44336";
                const ratio = Math.min(1, val / 40);
                const hue = ratio * 120;
                return `hsl(${hue}, 100%, 60%)`;
            } else if (type === 'cmd') {
                if (val >= 21) return "#ff00ff";
                const ratio = Math.min(1, val / 21);
                const hue = 120 - (ratio * 120);
                return `hsl(${hue}, 100%, 60%)`;
            } else if (type === 'poison') {
                if (val <= 0) return "#888";
                if (val >= 10) return "#ff00ff";
                const hue = Math.max(0, 120 - (val * 12));
                return `hsl(${hue}, 100%, 60%)`;
            }
            return "#888";
        }

        window.resetGame = () => {
            if (!confirm("ダイス以外の全ての数値を初期化しますか？")) return;
            playerSlots.forEach(slot => {
                rootRef.child(slot).update({ life: 40, poison: 0, rad: 0, tax1: 0, tax2: 0, cmd: null });
            });
        };

        window.shuffleNames = () => {
            const currentNames = playerSlots.map(slot => document.getElementById(`name-${slot}`).value).filter(n => n !== "");
            if (currentNames.length < 2) {
                alert("名前を2人以上選択してください");
                return;
            }

            let count = 0;
            const maxCount = 20;
            playerSlots.forEach(s => document.getElementById(`slot-${s}`).classList.add('shuffling'));

            const interval = setInterval(() => {
                playerSlots.forEach(slot => {
                    const sel = document.getElementById(`name-${slot}`);
                    sel.value = currentNames[Math.floor(Math.random() * currentNames.length)];
                });
                if (++count >= maxCount) {
                    clearInterval(interval);
                    const shuffled = [...currentNames];
                    for (let i = shuffled.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                    }
                    
                    playerSlots.forEach((slot, i) => {
                        const newName = shuffled[i] || "";
                        directInput(`${slot}/name`, newName);
                        document.getElementById(`slot-${slot}`).classList.remove('shuffling');
                    });
                }
            }, 80);
        };

        window.triggerDice = (slot) => {
            const input = document.getElementById(`dice-in-${slot}`);
            const val = input.value.toLowerCase();
            const match = val.match(/^(\d+)d(\d+)$/);
            if (!match) return;
            
            directInput(`${slot}/diceFormat`, val);
            let r = 0;
            const itv = setInterval(() => {
                const tmp = Array.from({length:match[1]},()=>Math.floor(Math.random()*match[2])+1).reduce((a,b)=>a+b);
                directInput(`${slot}/diceResult`, tmp);
                if (++r > 8) { 
                    clearInterval(itv); 
                    const final = Array.from({length:match[1]},()=>Math.floor(Math.random()*match[2])+1).reduce((a,b)=>a+b);
                    directInput(`${slot}/diceResult`, final); 
                }
            }, 80);
            input.blur();
        };

        memberRef.on('value', s => {
            const m = s.val() || [];
            playerSlots.forEach(slot => {
                const sel = document.getElementById(`name-${slot}`);
                const cur = sel.value;
                sel.innerHTML = '<option value="">名前選択</option>' + m.map(v => `<option value="${v}">${v}</option>`).join('');
                if(cur) sel.value = cur;
            });
        });

        rootRef.on('value', s => {
            const d = s.val() || {};
            playerSlots.forEach((target, targetIdx) => {
                const p = d[target] || {};
                const nameSel = document.getElementById(`name-${target}`);
                if (document.activeElement !== nameSel) nameSel.value = p.name || "";
                document.getElementById(`check-${target}`).checked = !!p.isPartner;
                document.getElementById(`dice-fmt-${target}`).innerText = p.diceFormat || "";
                document.getElementById(`dice-res-${target}`).innerText = p.diceResult || "--";
                
                const lifeIn = document.getElementById(`life-${target}`);
                if (document.activeElement !== lifeIn) {
                    const lifeVal = p.life ?? 40;
                    lifeIn.value = lifeVal;
                    lifeIn.style.color = getDynamicColor(lifeVal, 'life');
                    if (lifeVal >= 100) lifeIn.classList.add('small-font');
                    else lifeIn.classList.remove('small-font');
                }
                
                const sideMain = document.getElementById(`side-main-${target}`);
                const poi = p.poison ?? 0;
                const rad = p.rad ?? 0;
                let sideHtml = `<div class="side-item"><span class="side-label" style="color:#00bcd4">統唱数</span><button class="btn-side" onclick="changeValue('${target}/tax1',-1)">-</button><span class="side-val" style="color:#00bcd4">${p.tax1??0}</span><button class="btn-side" onclick="changeValue('${target}/tax1',1)">+</button></div>`;
                if(!!p.isPartner) sideHtml += `<div class="side-item"><span class="side-label" style="color:#00bcd4">統唱数</span><button class="btn-side" onclick="changeValue('${target}/tax2',-1)">-</button><span class="side-val" style="color:#00bcd4">${p.tax2??0}</span><button class="btn-side" onclick="changeValue('${target}/tax2',1)">+</button></div>`;
                sideHtml += `<div class="side-item"><span class="side-label" style="color:#adff2f">毒</span><button class="btn-side" onclick="changeValue('${target}/poison',-1)">-</button><span class="side-val" style="color:${getDynamicColor(poi, 'poison')}">${poi}</span><button class="btn-side" onclick="changeValue('${target}/poison',1)">+</button></div><div class="side-item"><span class="side-label" style="color:#ffeb3b">RAD</span><button class="btn-side" onclick="changeValue('${target}/rad',-1)">-</button><span class="side-val" style="color:${rad>0?'#ffeb3b':'#888'}">${rad}</span><button class="btn-side" onclick="changeValue('${target}/rad',1)">+</button></div>`;
                sideMain.innerHTML = sideHtml;

                const cmdArea = document.getElementById(`cmd-area-${target}`);
                cmdArea.innerHTML = '';
                playerSlots.forEach((from, fromIdx) => {
                    const fromIsP = !!d[from]?.isPartner;
                    const v1 = p.cmd?.[from]?.v1 ?? 0;
                    const v2 = p.cmd?.[from]?.v2 ?? 0;
                    const isSelf = (from === target);
                    
                    let boxHtml = `<div class="cmd-box cmd-${from} ${isSelf ? 'is-self' : ''}">
                        <div class="cmd-header"><span class="cmd-order">${fromIdx+1}</span><span class="cmd-name-label">${d[from]?.name||from}</span></div>
                        <div class="cmd-body">
                            <div class="cmd-unit">${fromIsP?'<span class="cmd-side-label">A</span>':''}<div class="cmd-val-wrap"><button class="btn-cmd" onclick="changeValue('${target}/cmd/${from}/v1',-1)">-</button><span class="cmd-val ${v1>=21?'fatal':''}" style="color:${getDynamicColor(v1, 'cmd')}">${v1}</span><button class="btn-cmd" onclick="changeValue('${target}/cmd/${from}/v1',1)">+</button></div></div>
                            ${fromIsP?`<div class="cmd-unit"><span class="cmd-side-label">B</span><div class="cmd-val-wrap"><button class="btn-cmd" onclick="changeValue('${target}/cmd/${from}/v2',-1)">-</button><span class="cmd-val ${v2>=21?'fatal':''}" style="color:${getDynamicColor(v2, 'cmd')}">${v2}</span><button class="btn-cmd" onclick="changeValue('${target}/cmd/${from}/v2',1)">+</button></div></div>`:''}
                        </div></div>`;
                    cmdArea.insertAdjacentHTML('beforeend', boxHtml);
                });
            });
        });

        window.changeValue = (path, delta) => {
            rootRef.child(path).transaction(c => {
                if (c === null) {
                    return (path.indexOf('life') !== -1 ? 40 : 0) + delta;
                }
                return c + delta;
            });
        };
        window.directInput = (path, value) => rootRef.child(path).set(value);
    </script>
</body>
</html>
